name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
        exclude:
          - os: macos-latest
            python-version: "3.10"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install package with dev dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Verify import and database resolution
      env:
        PHREEQC_DATABASE: ${{ github.workspace }}/databases/official
      run: |
        python -c "
        from server import main
        from utils.import_helpers import get_available_database_paths, PHREEQPYTHON_AVAILABLE
        print(f'PhreeqPython available: {PHREEQPYTHON_AVAILABLE}')
        paths = get_available_database_paths()
        print(f'Found {len(paths)} databases')
        for p in paths[:5]:
            print(f'  {p}')
        assert PHREEQPYTHON_AVAILABLE, 'PhreeqPython must be available'
        assert any('minteq.v4.dat' in p for p in paths), 'minteq.v4.dat must be discoverable'
        "

    - name: Run linting
      run: |
        python -m flake8 tools/ utils/ --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true

    - name: Run unit tests
      env:
        PHREEQC_DATABASE: ${{ github.workspace }}/databases/official
      run: |
        python -m pytest tests/ -v --cov=tools --cov=utils --cov-report=xml --cov-report=html

    - name: Test tool imports
      run: |
        python -c "
        import sys
        sys.path.append('.')
        from tools.chemical_addition import simulate_chemical_addition
        from tools.solution_speciation import calculate_solution_speciation
        from tools.scaling_potential import predict_scaling_potential
        from tools.phosphorus_removal import calculate_phosphorus_removal_dose
        from tools.dosing_requirement import calculate_dosing_requirement
        print('[PASS] All tools import successfully')
        "

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true

    - name: Store test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
        path: |
          htmlcov/
          coverage.xml
