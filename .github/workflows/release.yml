name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install package
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install build twine

    - name: Run full test suite
      run: |
        pytest tests/ -v --cov=tools --cov=utils

    - name: Build package
      run: |
        python -m build

    - name: Smoke test wheel install
      run: |
        python -m venv /tmp/smoke-test-venv
        /tmp/smoke-test-venv/bin/pip install dist/*.whl
        /tmp/smoke-test-venv/bin/python -c "from server import main; print('Wheel install OK')"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Water Chemistry MCP Server ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          dist/*.tar.gz
          dist/*.whl
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
